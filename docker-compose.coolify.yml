# ============================================================
# COOLIFY DEPLOYMENT - SISAPI Docker Compose Stack
# ============================================================
# This file is optimized for Coolify deployment on a VPS
# where SQL Server ALREADY EXISTS (external database).
#
# NO SQL Server container is created here.
# NO JasperServer — will be added later when needed.
#
# ── DB_HOST — how to reach SQL Server from inside the container ──
#   "host.docker.internal" → SQL Server on the SAME VPS host OS
#   "172.17.0.1"           → Docker bridge gateway (alternative)
#   "<actual-IP>"          → SQL Server on a REMOTE server
#   "sqlserver"            → ONLY if SQL Server is a Docker container
#                             on the SAME Docker network (sqlserver-network)
#
#   ⚠️  DO NOT use "localhost" — inside the container that means
#       the container itself, not the host.
#
# REQUIRED ENV VARS (set in Coolify UI):
#   DB_HOST            - See above (default: host.docker.internal)
#   DB_PORT            - SQL Server port (default: 1433)
#   DB_NAME            - Database name (default: sisapi)
#   DB_USER            - Database user (default: sa)
#   DB_PASSWORD        - Database password
#   JWT_SECRET_KEY     - JWT signing key (min 32 chars)
#   ALLOWED_ORIGINS    - Comma-separated allowed CORS origins
#   COOKIE_DOMAIN      - e.g. .xchar.site (with leading dot)
#   APP_DOMAIN         - Domain for Traefik (e.g. sisapinibu.xchar.site)
# ============================================================

services:
  sisapi:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Database Connection (external SQL Server - already running on VPS or remote)
      - ConnectionStrings__CoreConnection=Server=${DB_HOST:-localhost},${DB_PORT:-1433};Database=${DB_NAME:-sisapi};User Id=${DB_USER:-sa};Password=${DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      # JWT Settings
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER:-SisApi}
      - JwtSettings__Audience=${JWT_AUDIENCE:-SisApiClient}
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-10}
      - JwtSettings__RefreshTokenExpiryInDays=${JWT_REFRESH_EXPIRY_DAYS:-7}
      - JwtSettings__RememberMeRefreshTokenExpiryInDays=${JWT_REMEMBER_ME_EXPIRY_DAYS:-365}
      # Internal service-to-service API key
      - InternalApiKey=${INTERNAL_API_KEY}
      # CORS
      - AllowedOrigins=${ALLOWED_ORIGINS}
      # Cookie domain for cross-subdomain auth (e.g. .xchar.site)
      - CookieDomain=${COOKIE_DOMAIN}
    restart: unless-stopped
    networks:
      - coolify
      - sqlserver-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - "traefik.http.routers.sisapi.rule=Host(`${APP_DOMAIN}`)"
      - traefik.http.routers.sisapi.entryPoints=http
      - traefik.docker.network=coolify

networks:
  coolify:
    external: true
    name: coolify  # Coolify's default network for Traefik routing
  sqlserver-network:
    external: true
    name: sqlserver-network  # Network created by the SQL Server stack


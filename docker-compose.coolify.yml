# ============================================================
# COOLIFY DEPLOYMENT - SISAPI Docker Compose Stack
# ============================================================
# This file is optimized for Coolify deployment on a VPS
# where the database ALREADY EXISTS (external).
#
# NO database container is created here.
# NO JasperServer — will be added later when needed.
#
# ── DATABASE PROVIDER ───────────────────────────────────────
#   DB_PROVIDER (default: PostgreSQL)
#     "PostgreSQL"  → Npgsql driver
#     "SqlServer"   → Microsoft SQL Server driver
#
# ── CONNECTION STRING ───────────────────────────────────────
#   Set CONNECTION_STRING in Coolify to the full DSN for your DB.
#
#   PostgreSQL example:
#     Host=postgres-host;Port=5432;Database=sisapi;Username=sisapi;Password=secret
#
#   SQL Server example:
#     Server=sql-host,1433;Database=sisapi;User Id=sa;Password=secret;TrustServerCertificate=True;MultipleActiveResultSets=True
#
#   ⚠️  Do NOT use "localhost" — inside the container that means
#       the container itself, not the host.
#   ✅  Use "host.docker.internal" to reach the VPS host OS.
#   ✅  Use the service name if the DB is on the same Docker network.
#
# REQUIRED ENV VARS (set in Coolify UI):
#   CONNECTION_STRING  - Full DB connection string (see formats above)
#   DB_PROVIDER        - "PostgreSQL" or "SqlServer" (default: PostgreSQL)
#   JWT_SECRET_KEY     - JWT signing key (min 32 chars)
#   ALLOWED_ORIGINS    - Comma-separated allowed CORS origins
#   COOKIE_DOMAIN      - e.g. .xchar.site (with leading dot)
#   APP_DOMAIN         - Domain for Traefik (e.g. sisapinibu.xchar.site)
#
# OPTIONAL ENV VARS:
#   INTERNAL_API_KEY   - Service-to-service API key
#   JWT_ISSUER         - default: SisApi
#   JWT_AUDIENCE       - default: SisApiClient
#   JWT_EXPIRY_MINUTES - default: 10
#   JWT_REFRESH_EXPIRY_DAYS          - default: 7
#   JWT_REMEMBER_ME_EXPIRY_DAYS      - default: 365
# ============================================================

services:
  sisapi:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # ── Database ──────────────────────────────────────────
      # Set CONNECTION_STRING in Coolify to the full DSN for your DB.
      # Set DB_PROVIDER to "PostgreSQL" or "SqlServer".
      - ConnectionStrings__CoreConnection=${CONNECTION_STRING}
      - DatabaseProvider=${DB_PROVIDER:-PostgreSQL}
      # ── JWT ───────────────────────────────────────────────
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER:-SisApi}
      - JwtSettings__Audience=${JWT_AUDIENCE:-SisApiClient}
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-10}
      - JwtSettings__RefreshTokenExpiryInDays=${JWT_REFRESH_EXPIRY_DAYS:-7}
      - JwtSettings__RememberMeRefreshTokenExpiryInDays=${JWT_REMEMBER_ME_EXPIRY_DAYS:-365}
      # ── Auth & CORS ───────────────────────────────────────
      - InternalApiKey=${INTERNAL_API_KEY}
      - AllowedOrigins=${ALLOWED_ORIGINS}
      - CookieDomain=${COOKIE_DOMAIN}
    restart: unless-stopped
    networks:
      - coolify
      - sqlserver-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - "traefik.http.routers.sisapi.rule=Host(`${APP_DOMAIN}`)"
      - traefik.http.routers.sisapi.entryPoints=http
      - traefik.docker.network=coolify

networks:
  coolify:
    external: true
    name: coolify  # Coolify's default network for Traefik routing
  sqlserver-network:
    external: true
    name: sqlserver-network  # Network shared with the SQL Server / PostgreSQL stack
